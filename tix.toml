# tix.toml — generated by `tix init`

[context.nixos]
includes = [
    "common/**/*.nix",
    "hosts/**/default.nix",
    "hosts/desktop/**/*.nix",
    "hosts/framework/brightness/default.nix",
    "hosts/framework/hardware-configuration.nix",
    "hosts/framework/networking.nix",
    "hosts/thicc-server/**/*.nix",
]
excludes = [
    "common/default.nix",
    "common/essentials.nix",
    "common/homemanager/**/*.nix",
    "common/homemanager/hyprland/**/*.nix",
    "common/homemanager/hyprland/hyprpanel/**/*.nix",
    "common/kernel.nix",
    "common/portals.nix",
    "common/ssh.nix",
    "common/users/jmurray/home.nix",
    "common/users/jr/default.nix",
    "hosts/desktop/mic.nix",
    "hosts/desktop/programs.nix",
]
stubs = ["@nixos"]

[context.home-manager]
includes = [
    "common/default.nix",
    "common/homemanager/**/*.nix",
    "common/users/jmurray/home.nix",
    "common/users/jr/default.nix",
    "hosts/framework/fingerprint-reader.nix",
]
excludes = [
    "common/homemanager/cargo.nix",
    "common/homemanager/direnv.nix",
    "common/homemanager/gitui.nix",
    "common/homemanager/helix.nix",
    "common/homemanager/hyprland/hyprpanel/patched-panel.nix",
    "common/homemanager/noctalia.nix",
    "common/homemanager/nushell/default.nix",
    "common/homemanager/starship.nix",
    "common/homemanager/zed.nix",
]
stubs = ["@home-manager"]

[context.callpackage]
includes = [
    "pkgs/glance.nix",
    "pkgs/happy-server.nix",
    "pkgs/herdr.nix",
    "pkgs/polybar-spotify/default.nix",
    "templates/**/rust.nix",
]
stubs = ["@callpackage"]

# overlay files (no context needed): pkgs/overlay.nix

# library files (no context needed): common/essentials.nix, common/homemanager/cargo.nix, common/homemanager/gitui.nix, common/homemanager/helix.nix, common/homemanager/hyprland/hyprpanel/patched-panel.nix, common/homemanager/noctalia.nix, common/homemanager/nushell/default.nix, common/homemanager/starship.nix, common/homemanager/zed.nix, common/kernel.nix, common/portals.nix, hosts/**/programs.nix, hosts/desktop/mic.nix, pinned_from_flake.nix, pkgs/default.nix, pkgs/vscode.nix, templates/default.nix

# flake files (no context needed): flake.nix, templates/**/flake.nix


[stubs.generate]
nixpkgs = { expr = "(builtins.getFlake (toString ./.)).inputs.nixpkgs" }
home-manager = { expr = "(builtins.getFlake (toString ./.)).inputs.home-manager" }

# overlay files (no context needed): pkgs/overlay.nix

# library files (no context needed): common/essentials.nix, common/homemanager/cargo.nix, common/homemanager/gitui.nix, common/homemanager/helix.nix, common/homemanager/hyprland/hyprpanel/patched-panel.nix, common/homemanager/noctalia.nix, common/homemanager/nushell/default.nix, common/homemanager/starship.nix, common/homemanager/zed.nix, common/kernel.nix, common/portals.nix, hosts/desktop/mic.nix, hosts/desktop/programs.nix, hosts/framework/programs.nix, pinned_from_flake.nix, pkgs/default.nix, pkgs/vscode.nix, templates/default.nix

# flake files (no context needed): flake.nix, templates/bevy/flake.nix, templates/common/flake.nix, templates/rust/flake.nix, templates/zig/flake.nix

[project]
analyze = ["**/*.nix", "flake.nix"]
exclude = ["result", ".direnv"]
